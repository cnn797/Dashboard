<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Gym — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="topbar.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --text-primary:   #FAFAFA;
    --text-secondary: #B8B6B0;
    --text-tertiary:  #76746E;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  .hidden { display: none !important; }

  body {
    background-color: #050506;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    padding-bottom: 60px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(110,231,183,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(180,180,200,0.05) 0%, transparent 55%);
    filter: blur(40px);
    z-index: 0;
    pointer-events: none;
  }

  .page-inner {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ── Page title ── */
  .dash-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.025em;
    background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
  }

  /* ── Section label ── */
  .section-title {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .section-title::before {
    content: '';
    width: 18px; height: 1px;
    background: var(--text-tertiary);
    opacity: 0.6; flex-shrink: 0;
  }
  .section-title::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
  }

  /* ═══════════════════════════════════
     Weight tracker  (wt-* namespace)
     ═══════════════════════════════════ */

  .wt-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(110,231,183,0.10);
    border-radius: 18px;
    padding: 22px 20px 18px;
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }

  /* Current weight display */
  .wt-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .wt-num {
    font-size: 48px; font-weight: 600; letter-spacing: -0.025em;
    line-height: 1; font-variant-numeric: tabular-nums;
  }
  .wt-unit { font-size: 16px; color: var(--text-tertiary); }

  /* 7-day delta */
  .wt-delta {
    font-size: 13px; font-weight: 500; margin-bottom: 14px;
    font-variant-numeric: tabular-nums;
  }
  .wt-delta.up   { color: #F2C063; }   /* gaining — amber */
  .wt-delta.down { color: #6ee7b7; }   /* losing  — green */

  /* Streak */
  .wt-streak {
    color: #6ee7b7; font-size: 13px; font-weight: 500;
    margin-bottom: 14px;
    display: inline-flex; align-items: center; gap: 6px;
  }

  /* Empty state */
  .wt-empty {
    text-align: center; padding: 28px 16px;
    color: var(--text-tertiary); font-size: 13px;
    border: 1px dashed rgba(255,255,255,0.06);
    border-radius: 12px; margin-bottom: 4px;
  }

  /* Chart */
  .wt-chart-wrap { position: relative; margin: 16px 0 8px; }
  .wt-chart-yaxis {
    position: absolute; left: 0; top: 0; bottom: 0; width: 36px;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 4px 0;
  }
  .wt-chart-yaxis span {
    font-size: 10px; color: rgba(255,255,255,0.25);
    font-family: var(--font-mono);
  }
  .wt-chart {
    height: 130px; display: block;
    margin-left: 36px; width: calc(100% - 36px);
  }
  .wt-grid { stroke: rgba(255,255,255,0.05); stroke-width: 1; }
  .wt-area { fill: url(#wtFill); }
  .wt-line { fill: none; stroke: #6ee7b7; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .wt-avg-line { fill: none; stroke: rgba(110,231,183,0.45); stroke-width: 1.5; stroke-dasharray: 4 3; opacity: 0.6; }
  .wt-dot       { fill: #6ee7b7; stroke: rgba(5,5,6,0.9); stroke-width: 1.5; }
  .wt-dot-today { fill: #fff;    stroke: #6ee7b7; stroke-width: 2; }
  .wt-meta { text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 8px; }

  /* Legend */
  .wt-legend { display: flex; justify-content: center; gap: 18px; margin-top: 10px; }
  .wt-legend-item {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; letter-spacing: 0.18em; font-weight: 600;
    color: var(--text-tertiary);
  }
  .wt-legend-dot     { width: 14px; height: 2px; background: #6ee7b7; border-radius: 1px; }
  .wt-legend-dot-avg { background: transparent; border-top: 2px dashed rgba(110,231,183,0.45); height: 2px; }

  /* Locked (already logged today) */
  .wt-locked {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(110,231,183,0.04);
    border: 1px solid rgba(110,231,183,0.16);
    border-radius: 12px; padding: 12px 14px; margin-top: 14px;
  }
  .wt-locked-info { display: flex; align-items: center; gap: 12px; }
  .wt-locked-check {
    width: 30px; height: 30px;
    background: rgba(110,231,183,0.12); color: #6ee7b7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .wt-locked-label {
    font-size: 10px; letter-spacing: 0.16em; font-weight: 600;
    color: var(--text-tertiary); margin-bottom: 2px; text-transform: uppercase;
  }
  .wt-locked-value { font-size: 16px; font-weight: 600; }
  .wt-edit-btn {
    background: transparent; border: none; color: #6ee7b7;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; padding: 6px 10px;
    -webkit-tap-highlight-color: transparent;
  }

  /* Input row */
  .wt-input-row { margin-top: 14px; }
  .wt-input-top {
    display: grid; grid-template-columns: 1fr auto auto;
    align-items: center; gap: 10px;
  }
  .wt-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: inherit; font-size: 16px; font-weight: 500;
    padding: 11px 13px; width: 100%; outline: none;
    -moz-appearance: textfield;
  }
  .wt-input::-webkit-outer-spin-button,
  .wt-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .wt-input:focus { border-color: rgba(110,231,183,0.4); }
  .wt-unit-static { color: var(--text-tertiary); font-size: 13px; }
  .wt-save-btn {
    background: #6ee7b7; color: #000;
    border: none; border-radius: 10px;
    padding: 11px 18px; font-family: inherit;
    font-size: 13px; font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 8px rgba(110,231,183,0.25);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .wt-save-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(110,231,183,0.35); }
  .wt-save-btn:active { transform: scale(0.97); }

  @media (max-width: 480px) {
    .page-inner { padding: 16px 14px; }
    .dash-title { font-size: 22px; }
    .wt-num { font-size: 36px; }
    .wt-input-top { grid-template-columns: 1fr auto; }
    .wt-unit-static { display: none; }
  }
</style>
</head>
<body>

<div class="page-inner">
  <h1 class="dash-title">Gym</h1>

  <div class="section-title">Weight</div>

  <div class="wt-card">
    <!-- Current weight headline -->
    <div class="wt-row">
      <span class="wt-num" id="wtNum">—</span>
      <span class="wt-unit">kg</span>
    </div>

    <!-- 7-day delta (hidden until 2+ entries) -->
    <div class="wt-delta hidden" id="wtDelta"></div>

    <!-- Logging streak (hidden until streak ≥ 2) -->
    <div class="wt-streak hidden" id="wtStreak">🔥 <span id="wtStreakNum"></span></div>

    <!-- Empty state (shown on first visit) -->
    <div class="wt-empty" id="wtEmpty">Log your first weight to start tracking.</div>

    <!-- Chart (hidden until 2+ entries) -->
    <div class="wt-chart-wrap hidden" id="wtChartWrap">
      <div class="wt-chart-yaxis">
        <span id="wtYAxisMax">—</span>
        <span id="wtYAxisMin">—</span>
      </div>
      <svg class="wt-chart" viewBox="0 0 320 130" preserveAspectRatio="none">
        <defs>
          <linearGradient id="wtFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#6ee7b7" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
          </linearGradient>
          <filter id="wtGlow">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <line class="wt-grid" x1="0" y1="20"  x2="320" y2="20"/>
        <line class="wt-grid" x1="0" y1="65"  x2="320" y2="65"/>
        <line class="wt-grid" x1="0" y1="110" x2="320" y2="110"/>
        <g id="wtChartContent"></g>
      </svg>
      <div class="wt-meta" id="wtMeta">0 entries</div>
    </div>

    <!-- Chart legend (hidden until 2+ entries) -->
    <div class="wt-legend hidden" id="wtLegend">
      <span class="wt-legend-item"><span class="wt-legend-dot"></span>DAILY</span>
      <span class="wt-legend-item"><span class="wt-legend-dot wt-legend-dot-avg"></span>7-DAY AVG</span>
    </div>

    <!-- Locked row — shown when today is already logged -->
    <div class="wt-locked hidden" id="wtLocked">
      <div class="wt-locked-info">
        <span class="wt-locked-check">✓</span>
        <div>
          <div class="wt-locked-label">Logged today</div>
          <div class="wt-locked-value" id="wtLockedValue">— kg</div>
        </div>
      </div>
      <button class="wt-edit-btn" id="wtEditBtn">Edit</button>
    </div>

    <!-- Input row — shown when today is not yet logged -->
    <div class="wt-input-row" id="wtInputRow">
      <div class="wt-input-top">
        <input type="number" step="0.1" class="wt-input" id="wtInput"
               placeholder="Enter weight" inputmode="decimal" aria-label="Today's weight">
        <span class="wt-unit-static">kg</span>
        <button class="wt-save-btn" id="wtSaveBtn">Save</button>
      </div>
    </div>
  </div><!-- /.wt-card -->
</div><!-- /.page-inner -->

<script>
(function () {
  'use strict';

  const WT_KEY = 'po_coach_weights';
  const UNIT   = 'kg';

  // ── Supabase sync ─────────────────────────────────────────────
  const SUPABASE_URL = 'https://yqbptmylteamhtrgilsr.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxYnB0bXlsdGVhbWh0cmdpbHNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDg3MjcsImV4cCI6MjA5NDYyNDcyN30.BOzkHgRHMA3EK0ZVKiqTqxBdQhaod8nGGudQFMu3Z1s';
  const APP_KEY      = 'gym';
  const _sb          = typeof supabase !== 'undefined'
    ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
  let _lastJson = null;

  // ── Helpers ──────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function dateKey(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function parseKey(k) {
    const [y, m, d] = k.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  function load() {
    try {
      const arr = JSON.parse(localStorage.getItem(WT_KEY) || '[]');
      return Array.isArray(arr)
        ? arr.sort((a, b) => a.dateKey.localeCompare(b.dateKey))
        : [];
    } catch { return []; }
  }
  function save(arr) {
    try { localStorage.setItem(WT_KEY, JSON.stringify(arr)); } catch {}
  }
  function smoothPath(pts) {
    if (!pts.length) return '';
    if (pts.length === 1) return `M ${pts[0].x} ${pts[0].y}`;
    let p = `M ${pts[0].x.toFixed(2)} ${pts[0].y.toFixed(2)}`;
    for (let i = 1; i < pts.length; i++) {
      const a = pts[i - 1], b = pts[i], cx = (a.x + b.x) / 2;
      p += ` Q ${cx.toFixed(2)} ${a.y.toFixed(2)}, ${cx.toFixed(2)} ${((a.y + b.y) / 2).toFixed(2)}`;
      p += ` T ${b.x.toFixed(2)} ${b.y.toFixed(2)}`;
    }
    return p;
  }

  async function _push() {
    if (!_sb) return;
    const json = JSON.stringify(entries);
    if (json === _lastJson) return;
    _lastJson = json;
    await _sb.from('app_state').upsert(
      { key: APP_KEY, data: { weights: entries }, updated_at: new Date().toISOString() },
      { onConflict: 'key' }
    );
  }

  async function _pull() {
    if (!_sb) return;
    const { data, error } = await _sb.from('app_state').select('data').eq('key', APP_KEY).single();
    if (error || !data) return;
    const remote = data.data?.weights;
    if (!Array.isArray(remote)) return;
    // Remote is authoritative; preserve any local-only (offline) entries
    const map = new Map();
    entries.forEach(e => map.set(e.dateKey, e));
    remote.forEach(e => map.set(e.dateKey, e));
    entries = [...map.values()].sort((a, b) => a.dateKey.localeCompare(b.dateKey));
    save(entries);
    _lastJson = JSON.stringify(entries);
  }

  function _subscribe() {
    if (!_sb) return;
    _sb.channel('gym_state')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'app_state', filter: `key=eq.${APP_KEY}` },
        async () => { await _pull(); render(); })
      .subscribe();
  }

  // ── State ─────────────────────────────────────────────────────
  let entries = load();

  function saveEntry(weight) {
    const k = dateKey(new Date());
    const ex = entries.find(e => e.dateKey === k);
    if (ex) ex.weight = weight;
    else {
      entries.push({ dateKey: k, weight });
      entries.sort((a, b) => a.dateKey.localeCompare(b.dateKey));
    }
    save(entries);
    _push();
    render();
  }

  // ── Render ────────────────────────────────────────────────────
  function render() {
    const last       = entries[entries.length - 1] || null;
    const todayKey   = dateKey(new Date());
    const todayEntry = entries.find(e => e.dateKey === todayKey);

    $('wtNum').textContent = last ? last.weight.toFixed(1) : '—';

    if (todayEntry) {
      $('wtEmpty').classList.add('hidden');
      $('wtLockedValue').textContent = todayEntry.weight.toFixed(1) + ' ' + UNIT;
      $('wtLocked').classList.remove('hidden');
      $('wtInputRow').classList.add('hidden');
    } else {
      $('wtEmpty').classList.toggle('hidden', entries.length > 0);
      $('wtLocked').classList.add('hidden');
      $('wtInputRow').classList.remove('hidden');
      // Pre-fill with last known weight so user just has to tap Save
      if (last && !$('wtInput').value) $('wtInput').value = last.weight.toFixed(1);
    }

    if (entries.length >= 2) {
      $('wtChartWrap').classList.remove('hidden');
      $('wtLegend').classList.remove('hidden');
      renderChart();
      renderDelta();
    } else {
      $('wtChartWrap').classList.add('hidden');
      $('wtLegend').classList.add('hidden');
      $('wtDelta').classList.add('hidden');
    }
    renderStreak();
  }

  function renderStreak() {
    let streak = 0;
    const cursor = new Date();
    // Start counting from yesterday if today isn't logged yet
    if (!entries.find(e => e.dateKey === dateKey(cursor)))
      cursor.setDate(cursor.getDate() - 1);
    while (entries.find(e => e.dateKey === dateKey(cursor))) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }
    if (streak >= 2) {
      $('wtStreakNum').textContent = streak + ' day streak';
      $('wtStreak').classList.remove('hidden');
    } else {
      $('wtStreak').classList.add('hidden');
    }
  }

  function renderChart() {
    const recent  = entries.slice(-30);
    const weights = recent.map(e => e.weight);
    const minW = Math.min(...weights), maxW = Math.max(...weights);
    const pad  = Math.max((maxW - minW) * 0.15, 0.5);
    const yMin = minW - pad, yMax = maxW + pad;

    const xL = 8, xR = 312, yT = 20, yB = 110;
    const xFor = i  => recent.length === 1 ? xR : xL + (i / (recent.length - 1)) * (xR - xL);
    const yFor = w  => yB - ((w - yMin) / (yMax - yMin)) * (yB - yT);
    const pts   = recent.map((e, i) => ({ x: xFor(i), y: yFor(e.weight) }));

    const line = smoothPath(pts);
    const area = line +
      ` L ${pts[pts.length - 1].x.toFixed(2)} ${yB}` +
      ` L ${pts[0].x.toFixed(2)} ${yB} Z`;

    const avgPts = recent.map((_, i) => {
      const win = recent.slice(Math.max(0, i - 6), i + 1);
      const avg = win.reduce((s, p) => s + p.weight, 0) / win.length;
      return { x: xFor(i), y: yFor(avg) };
    });

    let html =
      `<path class="wt-avg-line" d="${smoothPath(avgPts)}"></path>` +
      `<path class="wt-area" d="${area}"></path>` +
      `<path class="wt-line" filter="url(#wtGlow)" d="${line}"></path>`;

    pts.forEach((p, i) => {
      const isLast = i === pts.length - 1;
      html += `<circle class="${isLast ? 'wt-dot-today' : 'wt-dot'}"` +
              ` cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="${isLast ? 5 : 3}"/>`;
    });

    $('wtChartContent').innerHTML = html;
    $('wtYAxisMax').textContent = yMax.toFixed(1);
    $('wtYAxisMin').textContent = yMin.toFixed(1);
    $('wtMeta').textContent =
      entries.length + (entries.length === 1 ? ' entry' : ' entries') +
      ' · last ' + recent.length + ' days';
  }

  function renderDelta() {
    const last   = entries[entries.length - 1];
    const cutoff = new Date(parseKey(last.dateKey));
    cutoff.setDate(cutoff.getDate() - 7);
    const baseline = entries.find(e => parseKey(e.dateKey) >= cutoff) || entries[0];
    const diff = last.weight - baseline.weight;
    const el   = $('wtDelta');
    if (Math.abs(diff) < 0.05) { el.classList.add('hidden'); return; }
    el.textContent = (diff > 0 ? '↑ +' : '↓ −') + Math.abs(diff).toFixed(1) + ' kg · last 7d';
    el.classList.toggle('up',   diff > 0);
    el.classList.toggle('down', diff < 0);
    el.classList.remove('hidden');
  }

  // ── Event wiring ──────────────────────────────────────────────
  $('wtSaveBtn').addEventListener('click', () => {
    const v = parseFloat($('wtInput').value);
    if (!isNaN(v) && v > 0) saveEntry(v);
  });
  $('wtInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('wtSaveBtn').click();
  });
  $('wtEditBtn').addEventListener('click', () => {
    $('wtLocked').classList.add('hidden');
    $('wtInputRow').classList.remove('hidden');
    const today = entries.find(e => e.dateKey === dateKey(new Date()));
    if (today) $('wtInput').value = today.weight.toFixed(1);
    $('wtInput').focus();
    $('wtInput').select();
  });

  // ── Boot ──────────────────────────────────────────────────────
  (async () => {
    await _pull();
    render();
    _subscribe();
    window.addEventListener('beforeunload', () => _push());
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') _push();
    });
  })();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Calendar</title>
<link rel="stylesheet" href="calendar.css">
<script src="topbar.js" defer></script>
<script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
<div class="shell">

  <!-- Page header -->
  <div class="page-header">
    <h1 class="page-title">Calendar</h1>
    <button class="gcal-signout-subtle" id="gcalSignOutPage" onclick="__gcalSignOut()" hidden>Sign out</button>
  </div>

  <!-- Google Calendar embed (primary) -->
  <div class="gcal-card">
    <div class="gcal-card-header">
      <span class="gcal-card-label">GOOGLE CALENDAR</span>
    </div>
    <div class="gcal-frame-wrap" id="gcalWrap">
      <iframe
        id="gcalFrame"
        class="gcal-frame"
        src="https://calendar.google.com/calendar/embed?src=christophnoe-nordberg2028%40u.northwestern.edu&ctz=America%2FChicago"
        frameborder="0"
        scrolling="no"
        title="Google Calendar"
      ></iframe>
    </div>
  </div>

  <!-- Upcoming events (Google Calendar API) -->
  <div class="gcal-card" style="margin-top:20px">
    <div class="gcal-card-header">
      <span class="gcal-card-label">UPCOMING EVENTS</span>
    </div>

    <!-- Unauthenticated -->
    <div class="gcal-signin-wrap" id="gcalApiAuth">
      <button class="gcal-signin-btn" onclick="__gcalSignIn()">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908C16.658 14.015 17.64 11.708 17.64 9.2z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.56 3.58 9 3.58z"/>
        </svg>
        Sign in with Google
      </button>
      <p class="gcal-auth-error" id="gcalAuthError" hidden></p>
    </div>

    <!-- Authenticated -->
    <div id="gcalApiEvents" hidden>
      <div id="gcalApiList"></div>
    </div>
  </div>

</div>
<script src="calendar-config.js"></script>
<script src="calendar-auth.js"></script>
</body>
</html>
